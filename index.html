function save(){try{localStorage.setItem('lb_sd',st.startDate||'');localStorage.setItem('lb_sx',JSON.stringify(st.sessions));}catch(e){}}

function tkey(){return new Date().toISOString().slice(0,10);}
function gw(){if(!st.startDate)return 1;return Math.max(1,Math.floor((Date.now()-new Date(st.startDate))/604800000)+1);}
function idl(w){return DW.includes(w);}
function gls(type){return[...st.sessions].reverse().find(s=>s.wt===type&&s.date!==tkey());}
function glw(idx){if(!st.logWT)return null;const s=gls(st.logWT);if(!s)return null;const ex=s.exs?.find(e=>e.slot===idx)||s.exs?.[idx];return ex?{w:ex.sets?.[0]?.w||null,name:ex.n}:null;}
function gprogs(sess){return sess.exs.filter(ex=>ex.sets.length>0&&ex.sets.every(s=>s.r>=(rtop(ex.r))&&s.w>0)).map(ex=>ex.n);}
function allprogs(){return[...new Set(st.sessions.slice(-6).flatMap(s=>s.progs||[]))].slice(0,5);}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;');}
function macrow(items){return '<div class="mr">'+items.map(m=>'<div class="mc"><div class="v" style="color:'+m.c+'">'+m.v+'</div><div class="l">'+m.l+'</div></div>').join('')+'</div>';}
function pbar(v,max,c,l){const p=Math.min(100,(v/max)*100);return '<div style="margin-bottom:10px"><div class="rb" style="margin-bottom:4px"><span class="lbl">'+l+'</span><span style="font-size:11px">'+v+'g</span></div><div class="pbw"><div class="pbf" style="width:'+p+'%;background:'+c+'"></div></div></div>';}

    +'<div class="rb">'

    +(dc.t!=='training'?'<div style="margin-top:10px;padding-top:10px;border-top:1px solid '+BDR+';font-size:10px;color:'+DIM+';line-height:1.6">'+(dc.t==='cardio'?'No pre-workout carb load. Snack + lighter dinner instead of shake \u2014 still hits ~2,330 kcal.':'No pre-workout, no shake. Snack + lighter dinner keeps you at ~2,330 kcal with protein spread every 3\u20134 hrs.')+'</div>':'')+'</div>'
    +meals.map((m,i)=>'<div class="card" style="border-top:2px solid '+m.color+';cursor:pointer" data-a="mdetail" data-i="'+i+'">'
      +'<div class="rb" style="margin-bottom:8px"><div><div style="font-size:9px;color:'+m.color+';font-weight:700;letter-spacing:.1em;margin-bottom:3px">'+m.time+'</div><div class="h1" style="font-size:20px;color:'+TXT+'">'+m.name.toUpperCase()+'</div></div>'
      +'<div style="text-align:right"><div class="h1" style="font-size:24px;color:'+m.color+'">'+m.cal+'</div><div style="font-size:8px;color:'+DIM+';font-weight:700">KCAL</div></div></div>'
      +'<div style="display:flex;gap:8px">'
      +[{l:'PRO',v:m.pro+'g'},{l:'CARB',v:m.carb+'g'},{l:'FAT',v:m.fat+'g'}].map(x=>'<div style="background:'+C2+';border:1px solid '+BDR+';border-radius:8px;padding:5px 10px;display:flex;gap:4px;align-items:center"><span style="font-size:7px;color:'+DIM+';font-weight:700;letter-spacing:.1em">'+x.l+'</span><span style="font-size:11px;color:'+TXT+'">'+x.v+'</span></div>').join('')
      +'<div style="margin-left:auto;font-size:9px;color:'+m.color+';align-self:center">DETAIL \u2192</div></div></div>').join('')
    +'</div>';
}

// ── LIFT ──
function rLift(){
  if(st.liftW!==null){
    const [nm,d]=Object.entries(WK)[st.liftW];
    return '<div class="pg"><button class="bghost" style="margin-top:max(56px,env(safe-area-inset-top));margin-bottom:8px;width:auto;padding:8px 14px;font-size:10px;color:'+d.color+';border-color:'+d.color+'44" data-a="lback">\u2190 ALL WORKOUTS</button>'
      +'<div class="card" style="border-left:3px solid '+d.color+';padding-left:17px">'
      +'<div class="h1" style="font-size:28px;color:'+TXT+';margin-bottom:4px">'+nm.toUpperCase()+'</div>'
      +'<div style="font-size:9px;color:'+DIM+'">'+d.day+'</div></div>'
      +d.ex.map(ex=>'<div class="card" style="margin-bottom:8px">'
        +'<div style="font-size:13px;color:'+TXT+';margin-bottom:6px">'+esc(ex.n)+'</div>'
        +'<div style="margin-bottom:10px">'+rpebadge(ex.rpe,ex.note)+'</div>'
        +'<div style="display:flex;gap:8px">'
        +[{l:'SETS',v:ex.s},{l:'REPS',v:ex.r},{l:'TOP REP',v:rtop(ex.r)}].map(m=>'<div style="flex:1;background:'+C2+';border:1px solid '+BDR+';border-radius:10px;padding:8px 6px;text-align:center"><div class="h1" style="font-size:16px;color:'+d.color+'">'+m.v+'</div><div style="font-size:7px;color:'+DIM+';font-weight:700;letter-spacing:.1em;margin-top:2px">'+m.l+'</div></div>').join('')
        +'</div></div>').join('')
      +'<div class="card" style="border-color:#FFD54F;background:#FFFDE7"><div class="lbl" style="color:'+W+';margin-bottom:6px">Warm-up Protocol</div><div style="font-size:11px;color:'+MUT+';line-height:1.7">5 min light cardio \u2192 1 set @ 50% \u2192 1 set @ 75% \u2192 work sets begin.</div></div></div>';
  }
  return '<div class="pg"><div class="ph"><div class="lbl" style="margin-bottom:6px">4-Day Split</div><div class="h1" style="font-size:40px;color:'+TXT+'">WORKOUTS</div></div>'
    +'<div class="card" style="border-color:#A5D6A7;background:#F1F8E9;margin-bottom:12px">'
    +'<div class="lbl" style="color:'+A+';margin-bottom:8px">RPE Targets</div>'
    +'<div style="display:flex;gap:10px;margin-bottom:8px"><span class="rpe8">RPE 8 \u2014 Compound lifts</span><span class="rpe7">RPE 7 \u2014 Isolation work</span></div>'
    +'<div style="font-size:10px;color:'+MUT+';line-height:1.6">RPE 8 = 2 reps left in the tank. RPE 7 = 3 reps left. Deload weeks: drop to RPE 5\u20136 across everything.</div></div>'
    +Object.entries(WK).map(([nm,d],i)=>'<div class="wcard" style="border-left-color:'+d.color+'" data-a="lsel" data-i="'+i+'">'
      +'<div class="rb"><div><div class="h1" style="font-size:22px;color:'+TXT+';margin-bottom:2px">'+nm.toUpperCase()+'</div><div style="font-size:9px;color:'+DIM+'">'+d.day+' \u00b7 '+d.ex.length+' exercises</div></div><div style="font-size:11px;color:'+d.color+'">VIEW \u2192</div></div>'
      +'<div style="display:flex;gap:6px;margin-top:10px">'
      +d.ex.slice(0,3).map(e=>'<div style="font-size:8px;background:'+C2+';border:1px solid '+BDR+';border-radius:6px;padding:3px 7px;color:'+DIM+';white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:90px">'+esc(e.n)+'</div>').join('')
      +(d.ex.length>3?'<div style="font-size:8px;color:'+DIM+';align-self:center">+'+(d.ex.length-3)+'</div>':'')
      +'</div></div>').join('')
    +'<div class="card"><div class="lbl" style="color:'+W+';margin-bottom:8px">Progressive Overload Rule</div>'
    +'<div style="font-size:11px;color:'+MUT+';line-height:1.7;margin-bottom:10px">Hit top of rep range on ALL sets at RPE \u22648 with clean form:</div>'
    +'<div style="display:flex;gap:8px">'
    +'<div style="flex:1;background:#FFF8E1;border:1px solid #FFD54F;border-radius:10px;padding:10px;text-align:center"><div class="h1" style="font-size:22px;color:'+W+'">+5 lbs</div><div style="font-size:8px;color:'+DIM+';margin-top:2px">BARBELL</div></div>'
    +'<div style="flex:1;background:#FFF8E1;border:1px solid #FFD54F;border-radius:10px;padding:10px;text-align:center"><div class="h1" style="font-size:22px;color:'+W+'">+2.5 lbs</div><div style="font-size:8px;color:'+DIM+';margin-top:2px">DUMBBELL</div></div>'
    +'</div></div></div>';
}

// ── SHAKES ──
function rShakes(){
  if(st.shakeD!==null){
    const s=SHAKES[st.shakeD];
    return '<div class="pg"><button class="bghost" style="margin-top:max(56px,env(safe-area-inset-top));margin-bottom:8px;width:auto;padding:8px 14px;font-size:10px;color:'+s.color+';border-color:'+s.color+'44" data-a="shback">\u2190 ALL SHAKES</button>'
      +'<div class="card" style="border-top:2px solid '+s.color+'">'
      +'<div style="display:inline-block;background:'+s.color+'18;color:'+s.color+';font-size:9px;font-weight:700;letter-spacing:.12em;padding:3px 9px;border-radius:100px;text-transform:uppercase;margin-bottom:10px">'+esc(s.tag)+'</div>'
      +'<div class="h1" style="font-size:34px;color:'+TXT+';margin-bottom:14px">'+esc(s.name).toUpperCase()+'</div>'
      +macrow([{l:'KCAL',v:s.cal,c:s.color},{l:'PRO',v:s.pro+'g',c:'#E05C1A'},{l:'CARB',v:s.carb+'g',c:'#5C9900'},{l:'FAT',v:s.fat+'g',c:'#D98800'}])+'</div>'
      +'<div class="card"><div style="display:flex;gap:8px">'
      +'<div style="flex:1;background:'+C2+';border:1px solid '+BDR+';border-radius:10px;padding:10px;text-align:center"><div class="h1" style="font-size:12px;color:'+s.color+'">'+esc(s.best)+'</div><div style="font-size:7px;color:'+DIM+';font-weight:700;letter-spacing:.1em;margin-top:3px">BEST FOR</div></div>'
      +'<div style="flex:1;background:'+C2+';border:1px solid '+BDR+';border-radius:10px;padding:10px;text-align:center"><div class="h1" style="font-size:12px;color:'+s.color+'">'+esc(s.timing)+'</div><div style="font-size:7px;color:'+DIM+';font-weight:700;letter-spacing:.1em;margin-top:3px">DRINK</div></div>'
      +'</div></div>'
      +'<div class="card"><div class="lbl" style="margin-bottom:10px">Ingredients</div>'
      +s.items.map((item,i)=>'<div style="display:flex;justify-content:space-between;padding:11px 0;border-bottom:'+(i<s.items.length-1?'1px solid '+BDR:'none')+'"><span style="font-size:13px;color:'+TXT+'">'+esc(item.split(' \u2014 ')[0])+'</span><span class="h1" style="font-size:16px;color:'+s.color+'">'+esc(item.split(' \u2014 ')[1]||'')+'</span></div>').join('')+'</div>'
      +'<div class="card" style="border-color:'+s.color+'44;background:'+s.color+'0A"><div class="lbl" style="color:'+s.color+';margin-bottom:8px">The Science</div><div style="font-size:11px;color:'+MUT+';line-height:1.7">'+esc(s.science)+'</div></div>'
      +'<div class="card"><div class="lbl" style="margin-bottom:8px">How to Blend</div><div style="font-size:11px;color:'+MUT+';line-height:1.7">Add all ingredients to blender. Blend on high 45\u201360 seconds until smooth. Drink immediately \u2014 never pre-make.</div></div></div>';
  }
  return '<div class="pg"><div class="ph"><div class="lbl" style="margin-bottom:6px">Science-Backed</div><div class="h1" style="font-size:40px;color:'+TXT+'">SHAKES</div></div>'
    +'<div class="card" style="border-color:#A5D6A7;background:#F1F8E9;margin-bottom:12px"><div class="lbl" style="color:'+A+';margin-bottom:8px">Your Go-To</div>'
    +'<div style="font-size:11px;color:'+MUT+';line-height:1.7">The <span style="color:'+A+';font-weight:700">Avocado Cream</span> is your default post-workout pre-sleep shake \u2014 built around your eating day and backed by 2025 research. The others are situational upgrades.</div></div>'
    +SHAKES.map((s,i)=>'<div class="card" style="border-top:2px solid '+s.color+';cursor:pointer" data-a="shsel" data-i="'+i+'">'
      +'<div class="rb" style="margin-bottom:8px"><div style="flex:1;padding-right:12px">'
      +'<div style="display:inline-block;background:'+s.color+'15;color:'+s.color+';font-size:8px;font-weight:700;letter-spacing:.1em;padding:2px 7px;border-radius:100px;text-transform:uppercase;margin-bottom:6px">'+esc(s.tag)+'</div>'
      +'<div class="h1" style="font-size:22px;color:'+TXT+'">'+esc(s.name).toUpperCase()+'</div>'
      +'<div style="font-size:9px;color:'+DIM+';margin-top:3px">'+esc(s.best)+'</div></div>'
      +'<div style="text-align:right;flex-shrink:0"><div class="h1" style="font-size:28px;color:'+s.color+'">'+s.cal+'</div><div style="font-size:7px;color:'+DIM+';font-weight:700">KCAL</div></div></div>'
      +'<div style="display:flex;gap:8px">'
      +[{l:'PRO',v:s.pro+'g'},{l:'CARB',v:s.carb+'g'},{l:'FAT',v:s.fat+'g'}].map(x=>'<div style="background:'+C2+';border:1px solid '+BDR+';border-radius:8px;padding:5px 10px;display:flex;gap:4px;align-items:center"><span style="font-size:7px;color:'+DIM+';font-weight:700;letter-spacing:.1em">'+x.l+'</span><span style="font-size:11px;color:'+TXT+'">'+x.v+'</span></div>').join('')
      +'<div style="margin-left:auto;font-size:9px;color:'+s.color+';align-self:center">RECIPE \u2192</div></div></div>').join('')
    +'</div>';
}

// ── HISTORY ──
function rHist(){
  if(!st.sessions.length)return '<div class="pg"><div class="ph"><div class="h1" style="font-size:40px;color:'+TXT+'">HISTORY</div></div><div style="font-size:11px;color:'+DIM+';padding:0 0 20px">No sessions logged yet.</div></div>';
  if(st.histIdx!==null){
    const s=st.sessions[st.sessions.length-1-st.histIdx],c=WK[s.wt]?.color||A;
    return '<div class="pg"><button class="bghost" style="margin-top:max(56px,env(safe-area-inset-top));margin-bottom:8px;width:auto;padding:8px 14px;font-size:10px;color:'+c+';border-color:'+c+'44" data-a="hback">\u2190 HISTORY</button>'
      +'<div class="card" style="border-top:2px solid '+c+'">'
      +'<div style="font-size:9px;color:'+c+';font-weight:700;letter-spacing:.1em;margin-bottom:4px">'+s.date+' \u00b7 Week '+s.week+(s.dl?' \u00b7 DELOAD':'')+'</div>'
      +'<div class="h1" style="font-size:30px;color:'+TXT+'">'+s.wt.toUpperCase()+'</div></div>'
      +s.exs.map((ex,i)=>{if(!ex.sets.length)return'';const top=rtop(ex.r),ah=ex.sets.every(s=>s.r>=top);const swapNote=ex.originalN&&ex.originalN!==ex.n?' <span style="font-size:8px;color:'+A+'">swapped from '+esc(ex.originalN)+'</span>':'';return'<div class="card"><div class="rb" style="margin-bottom:10px"><div><div style="font-size:13px;color:'+TXT+'">'+esc(ex.n)+swapNote+'</div></div>'+(ah?'<div style="font-size:8px;color:'+A+';font-weight:700;letter-spacing:.1em">\u2191 PR READY</div>':'')+'</div>'+ex.sets.map((set,j)=>'<div class="sr'+(set.r>=top?' hit':'')+'"><span class="sn">Set '+(j+1)+'</span><span>'+set.w+' lbs \u00d7 '+set.r+'</span></div>').join('')+'</div>';}).join('')
      +((s.progs||[]).length?'<div class="card" style="border-color:#A5D6A7;background:#F1F8E9"><div class="lbl" style="color:'+A+';margin-bottom:8px">Add Weight Next '+s.wt+'</div>'+(s.progs||[]).map((p,i)=>'<div style="font-size:11px;color:'+MUT+';padding:5px 0;border-bottom:'+(i<s.progs.length-1?'1px solid '+BDR:'none')+'">\u2191 '+esc(p)+'</div>').join('')+'</div>':'')
      +'</div>';
  }
  return '<div class="pg"><div class="ph"><div class="lbl" style="margin-bottom:6px">'+st.sessions.length+' sessions</div><div class="h1" style="font-size:40px;color:'+TXT+'">HISTORY</div></div>'
    +[...st.sessions].reverse().map((s,i)=>{const c=WK[s.wt]?.color||A,progs=s.progs||[];return'<div class="wcard" style="border-left-color:'+c+'" data-a="hsel" data-i="'+i+'"><div class="rb"><div><div style="font-size:9px;color:'+DIM+';margin-bottom:3px">'+s.date+' \u00b7 Week '+s.week+(s.dl?' \u00b7 DELOAD':'')+'</div><div class="h1" style="font-size:20px;color:'+TXT+'">'+s.wt.toUpperCase()+'</div><div style="font-size:9px;color:'+DIM+';margin-top:2px">'+s.exs.filter(e=>e.sets.length).length+'/'+s.exs.length+' exercises</div></div><div style="display:flex;flex-direction:column;align-items:flex-end;gap:5px">'+(progs.length?'<div style="font-size:8px;color:'+A+';font-weight:700;letter-spacing:.08em">\u2191 '+progs.length+' INCREASE'+(progs.length>1?'S':'')+'</div>':'')+'<div style="font-size:11px;color:'+c+'">VIEW \u2192</div></div></div></div>';}).join('')
    +'</div>';
}

// ── NAV ──
function rNav(){
  const tabs=[{id:'home',icon:'\u25c8',l:'HOME'},{id:'log',icon:'\u2295',l:'LOG'},{id:'eat',icon:'\u25c9',l:'EAT'},{id:'lift',icon:'\u25b3',l:'LIFT'},{id:'shakes',icon:'\u25a6',l:'SHAKES'},{id:'history',icon:'\u25ce',l:'HIST'}];
  return tabs.map(t=>'<button class="nb" data-a="tab" data-t="'+t.id+'"><div class="ni" style="color:'+(st.tab===t.id?A:'#C5C2BE')+'">'+t.icon+'</div><div class="nl" style="color:'+(st.tab===t.id?A:'#C5C2BE')+'">'+t.l+'</div></button>').join('');
}

// ── RENDER ──
function render(){
  const C=document.getElementById('content'),N=document.getElementById('nav');
  if(!st.startDate){C.innerHTML=rSetup();N.innerHTML='';return;}
  N.innerHTML=rNav();
  switch(st.tab){case'home':C.innerHTML=rHome();break;case'log':C.innerHTML=rLog();break;case'eat':C.innerHTML=rEat();break;case'lift':C.innerHTML=rLift();break;case'shakes':C.innerHTML=rShakes();break;case'history':C.innerHTML=rHist();break;}
  C.scrollTop=0;
}

// ── ACTIONS ──
function act(a,el){
  switch(a){
    case'setup':st.startDate=tkey();st.sessions=[];save();break;
    case'tab':st.tab=el.dataset.t;if(st.tab==='log')st.logPhase='select';st.histIdx=null;st.liftW=null;st.mealD=null;st.shakeD=null;st.mealSwapIdx={};break;
    case'goto-log':st.tab='log';st.logPhase='select';break;
    case'start':{const t=el.dataset.t,wk=WK[t];st.logWT=t;st.logData=wk.ex.map(e=>({n:e.n,originalN:e.n,r:e.r,s:e.s,rpe:e.rpe,note:e.note||null,completedSets:[]}));st.logExIdx=0;st.logSets=[];st.logLastW=null;st.showSwapPicker=false;st.logPhase='ex';}break;
    case'showswap':st.showSwapPicker=!st.showSwapPicker;break;
    case'doswap':{const nm=el.dataset.name;st.logData=st.logData.map((ex,i)=>i===st.logExIdx?{...ex,n:nm}:ex);st.showSwapPicker=false;}break;
    case'addset':{const w=parseFloat(document.getElementById('wi')?.value),r=parseInt(document.getElementById('ri')?.value);if(!w||!r||w<=0||r<=0)return;st.logLastW=w;st.logSets=[...st.logSets,{w,r}];}break;
    case'undo':if(st.logSets.length)st.logSets=st.logSets.slice(0,-1);break;
    case'nextex':{
      const upd=st.logData.map((ex,i)=>i===st.logExIdx?{...ex,completedSets:st.logSets}:ex);
      st.logData=upd;
      if(st.logExIdx<st.logData.length-1){st.logExIdx++;st.logSets=[];st.logLastW=null;st.showSwapPicker=false;}
      else{const sess={date:tkey(),week:gw(),wt:st.logWT,dl:idl(gw()),exs:upd.map((ex,i)=>({slot:i,n:ex.n,originalN:ex.originalN||ex.n,r:ex.r,sets:ex.completedSets}))};sess.progs=gprogs(sess);st.sessions=[...st.sessions.filter(s=>!(s.date===sess.date&&s.wt===sess.wt)),sess];save();st.logPhase='done';}
    }break;
    case'skipex':{const upd=st.logData.map((ex,i)=>i===st.logExIdx?{...ex,completedSets:[]}:ex);st.logData=upd;if(st.logExIdx<st.logData.length-1){st.logExIdx++;st.logSets=[];st.logLastW=null;st.showSwapPicker=false;}else st.logPhase='done';}break;
    case'resetlog':st.logPhase='select';break;
    case'eday':st.eatDay=parseInt(el.dataset.i);st.mealD=null;break;
    case'mdetail':st.mealD=parseInt(el.dataset.i);break;
    case'swaptab':if(!st.mealSwapIdx)st.mealSwapIdx={};st.mealSwapIdx[el.dataset.k]=parseInt(el.dataset.i);break;
    case'mback':st.mealD=null;break;
    case'lsel':st.liftW=parseInt(el.dataset.i);break;
    case'lback':st.liftW=null;break;
    case'shsel':st.shakeD=parseInt(el.dataset.i);break;
    case'shback':st.shakeD=null;break;
    case'hsel':st.histIdx=parseInt(el.dataset.i);break;
    case'hback':st.histIdx=null;break;
  }
  render();
  if(a==='addset'&&st.logPhase==='ex'&&st.logSets.length<st.logData[st.logExIdx]?.s){setTimeout(()=>document.getElementById('ri')?.focus(),60);}
}

document.addEventListener('click',e=>{const el=e.target.closest('[data-a]');if(!el)return;e.preventDefault();act(el.dataset.a,el);});
document.addEventListener('touchend',e=>{if(e.target.closest('[data-a]')||e.target.tagName==='INPUT')return;e.preventDefault();},{passive:false});
load();render();
</script>
